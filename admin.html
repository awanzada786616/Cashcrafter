<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | CrashCrafter AI Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar-btn { transition: 0.3s; padding: 14px 20px; border-radius: 12px; width: 100%; text-align: left; margin-bottom: 6px; font-weight: 500; font-size: 14px; color: #64748b; display: flex; align-items: center; gap: 12px; }
        .sidebar-btn:hover, .btn-active { background: linear-gradient(90deg, #6366f1, #8b5cf6); color: white; box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3); }
        .stat-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); border-color: #6366f1; }
        .hidden { display: none !important; }
        tr { background: rgba(255,255,255,0.02); transition: 0.2s; }
        tr:hover { background: rgba(255,255,255,0.05); }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- AUTH LOCK SCREEN -->
    <div id="adminLock" class="fixed inset-0 z-[2000] bg-slate-950 flex items-center justify-center p-4">
        <div class="glass p-10 w-full max-w-md rounded-[40px] text-center border-indigo-500/30">
            <div class="w-24 h-24 bg-gradient-to-tr from-indigo-600 to-purple-600 rounded-full mx-auto flex items-center justify-center mb-6 shadow-2xl">
                <i class="fas fa-user-shield text-4xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold orbitron tracking-widest mb-2 text-white">ADMIN PORTAL</h1>
            <div class="space-y-4">
                <input type="email" id="adminEmail" placeholder="Admin Email" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500 text-white text-sm">
                <input type="password" id="adminPass" placeholder="Security Password" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500 text-white text-sm">
                <button onclick="handleAdminLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold uppercase text-xs tracking-widest transition shadow-lg">Verify & Unlock</button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="hidden w-72 bg-[#020617] border-r border-white/5 p-6 flex flex-col fixed h-full z-[100]">
        <div class="flex items-center gap-3 mb-12 px-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                <i class="fas fa-crown text-white"></i>
            </div>
            <h2 class="orbitron text-lg font-black tracking-tighter text-white">CRAFTER <span class="text-indigo-500">AI</span></h2>
        </div>
        <nav class="flex-grow">
            <button onclick="showTab('dashboard')" class="sidebar-btn btn-active" id="btn-dashboard"><i class="fas fa-chart-pie"></i> Dashboard</button>
            <button onclick="showTab('deposits')" class="sidebar-btn" id="btn-deposits"><i class="fas fa-receipt"></i> Deposits</button>
            <button onclick="showTab('withdraws')" class="sidebar-btn" id="btn-withdraws"><i class="fas fa-wallet"></i> Withdrawals</button>
            <button onclick="showTab('users')" class="sidebar-btn" id="btn-users"><i class="fas fa-user-friends"></i> Users</button>
            <button onclick="showTab('settings')" class="sidebar-btn" id="btn-settings"><i class="fas fa-cog"></i> Settings</button>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="mainPanel" class="hidden ml-72 flex-grow p-10">
        
        <!-- DASHBOARD STATS -->
        <section id="tab-dashboard" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
                <div class="stat-card p-6 rounded-[30px]">
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-4">Total Users</p>
                    <h2 id="totalUsersCount" class="text-4xl font-bold text-white">0</h2>
                </div>
                <div class="stat-card p-6 rounded-[30px]">
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-4">Total Invested</p>
                    <h2 id="totalInvestedCount" class="text-4xl font-bold text-indigo-400">$0</h2>
                </div>
                <div class="stat-card p-6 rounded-[30px]">
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-4">New Deposits</p>
                    <h2 id="pendingDepCount" class="text-4xl font-bold text-yellow-500">0</h2>
                </div>
                <div class="stat-card p-6 rounded-[30px]">
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-4">New Payouts</p>
                    <h2 id="pendingWitCount" class="text-4xl font-bold text-green-500">0</h2>
                </div>
            </div>
        </section>

        <!-- DEPOSITS (Fixed Username logic) -->
        <section id="tab-deposits" class="tab-content hidden">
            <h3 class="text-2xl font-bold orbitron mb-8 uppercase tracking-widest">Deposit Requests</h3>
            <div id="depositList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Data via JS -->
            </div>
        </section>

        <!-- WITHDRAWALS -->
        <section id="tab-withdraws" class="tab-content hidden">
            <h3 class="text-2xl font-bold orbitron mb-8 uppercase tracking-widest">Payout Queue</h3>
            <div id="withdrawList" class="space-y-4">
                <!-- Data via JS -->
            </div>
        </section>

        <!-- USERS -->
        <section id="tab-users" class="tab-content hidden">
            <h3 class="text-2xl font-bold orbitron mb-8 uppercase tracking-widest">User Database</h3>
            <div class="glass rounded-[30px] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-gray-400 text-[10px] font-black uppercase">
                        <tr>
                            <th class="p-6">User</th>
                            <th class="p-6">Balance</th>
                            <th class="p-6">Active Plan</th>
                            <th class="p-6">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </section>

        <!-- SETTINGS -->
        <section id="tab-settings" class="tab-content hidden">
            <h3 class="text-2xl font-bold orbitron mb-8 uppercase tracking-widest">Gateway Settings</h3>
            <div class="glass p-10 rounded-[40px] max-w-2xl space-y-6">
                <input type="text" id="setEP" placeholder="Easypaisa No" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500">
                <input type="text" id="setJC" placeholder="JazzCash No" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500">
                <button onclick="saveSystemSettings()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold">Save Settings</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCutZ4-S27z8DzRQQnREMDLKdP-b3zV95s",
            authDomain: "cricketpredition-5a66d.firebaseapp.com",
            projectId: "cricketpredition-5a66d",
            storageBucket: "cricketpredition-5a66d.firebasestorage.app",
            messagingSenderId: "980647942349",
            appId: "1:980647942349:web:8e2100fdc783723623b184"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_UID = "EuEaVrAhTCY5cCTtbzywlJcFkf12";

        // ROI Rates Mapping
        const planRates = {
            'Starter Tier': 0.05,
            'Basic Tier': 0.10,
            'Standard Tier': 0.30,
            'Pro Tier': 0.70,
            'Business Tier': 2.00,
            'Investor Tier': 4.50,
            'Ultimate Tier': 10.00
        };

        window.handleAdminLogin = async () => {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            try {
                const user = await signInWithEmailAndPassword(auth, email, pass);
                if (user.user.uid === ADMIN_UID) {
                    document.getElementById('adminLock').classList.add('hidden');
                    document.getElementById('sidebar').classList.remove('hidden');
                    document.getElementById('mainPanel').classList.remove('hidden');
                    startEngine();
                } else { await signOut(auth); Swal.fire('Error', 'Not Admin', 'error'); }
            } catch (e) { Swal.fire('Error', 'Login Failed', 'error'); }
        };

        function startEngine() {
            // Stats & Users
            onSnapshot(collection(db, "users"), (snap) => {
                document.getElementById('totalUsersCount').innerText = snap.size;
                let totalI = 0;
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = "";
                snap.forEach(u => {
                    const ud = u.data();
                    totalI += Number(ud.totalInvested || 0);
                    tbody.innerHTML += `
                        <tr>
                            <td class="p-6 font-bold">${ud.name || 'User'}<br><span class="text-[9px] text-gray-500 font-normal">${ud.email}</span></td>
                            <td class="p-6 font-bold text-indigo-400">$${Number(ud.balance || 0).toFixed(2)}</td>
                            <td class="p-6 text-[10px] font-black uppercase text-gray-400">${ud.activePlan || 'None'}</td>
                            <td class="p-6"><button onclick="editBalance('${u.id}', ${ud.balance})" class="text-indigo-400"><i class="fas fa-edit"></i></button></td>
                        </tr>`;
                });
                document.getElementById('totalInvestedCount').innerText = "$" + totalI.toFixed(0);
            });

            // DEPOSITS (Fixed Username logic)
            onSnapshot(query(collection(db, "deposits"), where("status", "==", "pending")), (snap) => {
                document.getElementById('pendingDepCount').innerText = snap.size;
                const div = document.getElementById('depositList');
                div.innerHTML = "";
                snap.forEach(d => {
                    const dd = d.data();
                    // Fallback username if dashboard misses it
                    const finalName = dd.userName || dd.user || "Unknown Investor";
                    div.innerHTML += `
                        <div class="glass p-6 rounded-3xl border-l-4 border-yellow-500">
                            <div class="mb-4">
                                <h4 class="text-xs font-black text-indigo-400 uppercase tracking-widest">Requested Plan: ${dd.plan}</h4>
                                <h2 class="text-3xl font-bold text-white mt-1">$${dd.amount}</h2>
                                <p class="text-sm font-bold text-gray-400 mt-2">By: <span class="text-white">${finalName}</span></p>
                                <p class="text-[10px] text-yellow-500 font-black mt-1">TID: ${dd.tid}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="approveDeposit('${d.id}', '${dd.uid}', '${dd.plan}', ${dd.amount})" class="flex-grow bg-green-600 py-3 rounded-xl font-black text-[10px] uppercase">Verify & Approve</button>
                                <button onclick="rejectItem('deposits', '${d.id}')" class="bg-red-600/10 text-red-500 px-4 rounded-xl"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
            });

            // WITHDRAWALS
            onSnapshot(query(collection(db, "withdrawals"), where("status", "==", "pending")), (snap) => {
                document.getElementById('pendingWitCount').innerText = snap.size;
                const div = document.getElementById('withdrawList');
                div.innerHTML = "";
                snap.forEach(w => {
                    const wd = w.data();
                    const netAmt = wd.netPayable || wd.amount || 0; 
                    div.innerHTML += `
                        <div class="glass p-6 rounded-3xl flex justify-between items-center border-l-4 border-green-500">
                            <div>
                                <p class="text-[10px] text-gray-500 font-bold uppercase">Net Payout</p>
                                <h2 class="text-3xl font-black text-green-500">$${Number(netAmt).toFixed(2)}</h2>
                                <p class="text-sm font-bold text-white mt-2">${wd.userName || 'Investor'}</p>
                                <p class="text-[10px] text-indigo-400 font-black uppercase">${wd.method}: ${wd.accountNumber || wd.accNum || wd.addr}</p>
                                <p class="text-[9px] text-gray-500">Title: ${wd.accountTitle || wd.accTitle || 'N/A'}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="approveWithdrawal('${w.id}')" class="bg-indigo-600 px-6 py-4 rounded-2xl text-[10px] font-black uppercase">Mark Paid</button>
                                <button onclick="rejectItem('withdrawals', '${w.id}')" class="bg-red-600/10 text-red-500 px-4 rounded-xl"><i class="fas fa-times"></i></button>
                            </div>
                        </div>`;
                });
            });
        }

        window.approveDeposit = async (id, uid, planName, amount) => {
            const uRef = doc(db, "users", uid);
            const uSnap = await getDoc(uRef);
            if(uSnap.exists()){
                const daily = planRates[planName] || 0;
                await updateDoc(doc(db, "deposits", id), { status: "approved" });
                await updateDoc(uRef, {
                    activePlan: planName,
                    dailyIncome: daily,
                    totalInvested: (uSnap.data().totalInvested || 0) + Number(amount)
                });
                // 10% Referral Commission
                const ref = uSnap.data().referredBy;
                if(ref){
                    const rRef = doc(db, "users", ref);
                    const rSnap = await getDoc(rRef);
                    if(rSnap.exists()){
                        const bonus = Number(amount) * 0.10;
                        await updateDoc(rRef, {
                            balance: (rSnap.data().balance || 0) + bonus,
                            referralBonus: (rSnap.data().referralBonus || 0) + bonus
                        });
                    }
                }
                Swal.fire('Approved', 'Plan Activated Successfully', 'success');
            }
        };

        window.approveWithdrawal = async (id) => {
            await updateDoc(doc(db, "withdrawals", id), { status: "approved" });
            Swal.fire('Paid', 'Withdrawal status updated to Approved', 'success');
        };

        window.editBalance = async (id, current) => {
            const { value: amt } = await Swal.fire({
                title: 'Adjust Balance ($)',
                input: 'number',
                inputValue: current,
                showCancelButton: true
            });
            if (amt) await updateDoc(doc(db, "users", id), { balance: Number(amt) });
        };

        window.rejectItem = async (col, id) => {
            if(confirm('Delete this request?')) await deleteDoc(doc(db, col, id));
        };

        window.saveSystemSettings = async () => {
            await setDoc(doc(db, "settings", "admin"), {
                ep: document.getElementById('setEP').value,
                jc: document.getElementById('setJC').value
            }, {merge: true});
            Swal.fire('Success', 'Admin details updated', 'success');
        };

        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('btn-active'));
            document.getElementById('btn-' + tab).classList.add('btn-active');
        };

    </script>
</body>
</html>
