<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Admin | CrashCrafter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .sidebar-btn { transition: 0.3s; padding: 15px; border-radius: 15px; width: 100%; text-align: left; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .sidebar-btn:hover, .btn-active { background: linear-gradient(90deg, #6366f1, #a855f7); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .stat-card { background: linear-gradient(145deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.8)); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- 1. LOCK SCREEN -->
    <div id="adminLock" class="fixed inset-0 z-[1000] bg-slate-950 flex items-center justify-center p-4">
        <div class="glass p-10 w-full max-w-md rounded-[40px] text-center border-indigo-500/20">
            <div class="w-20 h-20 bg-indigo-600 rounded-full mx-auto flex items-center justify-center mb-6 shadow-2xl shadow-indigo-600/40">
                <i class="fas fa-crown text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold orbitron tracking-tighter mb-8 text-indigo-400">ADMIN ACCESS</h1>
            <div class="space-y-4">
                <input type="email" id="adminEmail" placeholder="Master Email" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500 transition text-sm">
                <input type="password" id="adminPass" placeholder="Master Password" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500 transition text-sm">
                <button onclick="handleAdminLogin()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold uppercase text-xs tracking-widest shadow-lg">Verify Authority</button>
            </div>
        </div>
    </div>

    <!-- 2. SIDEBAR -->
    <aside id="sidebar" class="hidden w-72 bg-slate-950 border-r border-white/5 p-6 flex flex-col fixed h-full z-50">
        <h2 class="orbitron text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-10">CRASHCRAFTER</h2>
        <nav class="flex-grow">
            <button onclick="showTab('deposits')" class="sidebar-btn btn-active" id="btn-deposits"><i class="fas fa-arrow-down mr-3"></i> Deposits</button>
            <button onclick="showTab('withdraws')" class="sidebar-btn text-gray-400" id="btn-withdraws"><i class="fas fa-arrow-up mr-3"></i> Withdrawals</button>
            <button onclick="showTab('users')" class="sidebar-btn text-gray-400" id="btn-users"><i class="fas fa-users mr-3"></i> User Manager</button>
            <button onclick="showTab('settings')" class="sidebar-btn text-gray-400" id="btn-settings"><i class="fas fa-sliders-h mr-3"></i> Site Settings</button>
        </nav>
        <button onclick="location.reload()" class="mt-auto p-4 bg-red-500/10 text-red-500 rounded-2xl text-xs font-bold uppercase"><i class="fas fa-power-off mr-2"></i> Logout</button>
    </aside>

    <!-- 3. MAIN CONTENT -->
    <main id="mainPanel" class="hidden ml-72 flex-grow p-10">
        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="stat-card p-8 rounded-3xl">
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Total Active Users</p>
                <h2 id="totalUsersCount" class="text-5xl font-bold mt-2">0</h2>
            </div>
            <div class="stat-card p-8 rounded-3xl border-b-4 border-yellow-500">
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Pending Deposits</p>
                <h2 id="pendingDepCount" class="text-5xl font-bold mt-2 text-yellow-500">0</h2>
            </div>
            <div class="stat-card p-8 rounded-3xl border-b-4 border-green-500">
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Pending Withdraws</p>
                <h2 id="pendingWitCount" class="text-5xl font-bold mt-2 text-green-500">0</h2>
            </div>
        </div>

        <!-- TAB: DEPOSITS -->
        <section id="tab-deposits" class="tab-content">
            <h3 class="text-2xl font-bold mb-6">Deposit Requests</h3>
            <div id="depositList" class="space-y-4"></div>
        </section>

        <!-- TAB: WITHDRAWS -->
        <section id="tab-withdraws" class="tab-content hidden">
            <h3 class="text-2xl font-bold mb-6 text-green-500">Withdraw Requests</h3>
            <div id="withdrawList" class="space-y-4"></div>
        </section>

        <!-- TAB: USERS -->
        <section id="tab-users" class="tab-content hidden">
            <h3 class="text-2xl font-bold mb-6">Manage All Users</h3>
            <div id="userList" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm"></div>
        </section>

        <!-- TAB: SETTINGS -->
        <section id="tab-settings" class="tab-content hidden">
            <h3 class="text-2xl font-bold mb-6 text-indigo-400">System Configuration</h3>
            <div class="glass p-8 rounded-[30px] max-w-2xl space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="setEP" placeholder="Easypaisa Number" class="bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500">
                    <input type="text" id="setJC" placeholder="JazzCash Number" class="bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500">
                </div>
                <textarea id="setNotice" rows="4" placeholder="Scrolling Marquee Notice" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500"></textarea>
                <button onclick="saveSystemSettings()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-600/30">UPDATE SETTINGS</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCutZ4-S27z8DzRQQnREMDLKdP-b3zV95s",
            authDomain: "cricketpredition-5a66d.firebaseapp.com",
            projectId: "cricketpredition-5a66d",
            storageBucket: "cricketpredition-5a66d.firebasestorage.app",
            messagingSenderId: "980647942349",
            appId: "1:980647942349:web:8e2100fdc783723623b184"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 🔥 IMPORTANT: Apna UID yahan paste karain
        const ADMIN_UID = "EuEaVrAhTCY5cCTtbzywlJcFkf12"; 

        window.handleAdminLogin = async () => {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                if (userCredential.user.uid === ADMIN_UID) {
                    document.getElementById('adminLock').classList.add('hidden');
                    document.getElementById('sidebar').classList.remove('hidden');
                    document.getElementById('mainPanel').classList.remove('hidden');
                    startAdminEngine();
                } else {
                    await signOut(auth);
                    Swal.fire('Denied', 'You are not the Master Admin!', 'error');
                }
            } catch (e) { Swal.fire('Error', 'Invalid Admin Credentials', 'error'); }
        };

        function startAdminEngine() {
            // Fix 1: Total User Counter (Real-time)
            onSnapshot(collection(db, "users"), (snap) => {
                document.getElementById('totalUsersCount').innerText = snap.size;
                const userDiv = document.getElementById('userList');
                userDiv.innerHTML = "";
                snap.forEach(u => {
                    const ud = u.data();
                    userDiv.innerHTML += `<div class="glass p-4 rounded-2xl">
                        <p class="font-bold text-indigo-400">${ud.name || 'No Name'}</p>
                        <p class="text-[10px] text-gray-500">${ud.email}</p>
                        <p class="font-bold mt-2 text-white">Bal: Rs ${ud.balance.toFixed(2)}</p>
                    </div>`;
                });
            });

            // Pending Deposits
            onSnapshot(query(collection(db, "deposits"), where("status", "==", "pending")), (snap) => {
                document.getElementById('pendingDepCount').innerText = snap.size;
                const depDiv = document.getElementById('depositList');
                depDiv.innerHTML = "";
                snap.forEach(d => {
                    const dd = d.data();
                    depDiv.innerHTML += `<div class="glass p-6 rounded-3xl flex justify-between items-center border-l-4 border-yellow-500">
                        <div>
                            <p class="font-bold text-white">${dd.email}</p>
                            <p class="text-xs text-indigo-400 font-bold">Plan: ${dd.plan} (Rs ${dd.amount})</p>
                            <p class="text-xs text-yellow-500 font-bold uppercase mt-1">TID: ${dd.tid}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="approveDeposit('${d.id}', '${dd.uid}', '${dd.plan}', ${dd.daily}, ${dd.amount})" class="bg-green-600 px-6 py-2 rounded-xl text-[10px] font-bold">APPROVE</button>
                            <button onclick="rejectItem('deposits', '${d.id}')" class="bg-red-600 px-4 py-2 rounded-xl text-[10px] font-bold">REJECT</button>
                        </div>
                    </div>`;
                });
            });

            // Pending Withdraws
            onSnapshot(query(collection(db, "withdrawals"), where("status", "==", "pending")), (snap) => {
                document.getElementById('pendingWitCount').innerText = snap.size;
                const witDiv = document.getElementById('withdrawList');
                witDiv.innerHTML = "";
                snap.forEach(w => {
                    const wd = w.data();
                    witDiv.innerHTML += `<div class="glass p-6 rounded-3xl flex justify-between items-center border-l-4 border-green-500">
                        <div>
                            <p class="font-bold text-white">Rs ${wd.amount}</p>
                            <p class="text-xs text-gray-400">${wd.bank}: ${wd.num} (${wd.title})</p>
                        </div>
                        <button onclick="approveWithdraw('${w.id}')" class="bg-green-600 px-6 py-2 rounded-xl text-[10px] font-bold">MARK PAID</button>
                    </div>`;
                });
            });

            // Load Settings (Auto-Create Fix)
            const settingsRef = doc(db, "settings", "admin");
            onSnapshot(settingsRef, (s) => {
                if(s.exists()){
                    document.getElementById('setEP').value = s.data().ep || "";
                    document.getElementById('setJC').value = s.data().jc || "";
                    document.getElementById('setNotice').value = s.data().notice || "";
                }
            });
        }

        // Logic: Save Settings (Uses SET instead of UPDATE to fix your error)
        window.saveSystemSettings = async () => {
            const data = {
                ep: document.getElementById('setEP').value,
                jc: document.getElementById('setJC').value,
                notice: document.getElementById('setNotice').value
            };
            try {
                await setDoc(doc(db, "settings", "admin"), data, { merge: true });
                Swal.fire('Success', 'Settings Updated Successfully!', 'success');
            } catch (e) { Swal.fire('Error', e.message, 'error'); }
        };

        window.approveDeposit = async (id, uid, plan, daily, amt) => {
            const uRef = doc(db, "users", uid);
            const uSnap = await getDoc(uRef);
            if(uSnap.exists()){
                const ud = uSnap.data();
                await updateDoc(uRef, { activePlan: plan, dailyIncome: daily });
                // Referral Commission
                if(ud.referredBy){
                    const rRef = doc(db, "users", ud.referredBy);
                    const rSnap = await getDoc(rRef);
                    if(rSnap.exists()){
                        await updateDoc(rRef, { balance: rSnap.data().balance + (amt * 0.20) });
                    }
                }
                await updateDoc(doc(db, "deposits", id), { status: "approved" });
                Swal.fire('Success', 'Deposit Approved!', 'success');
            }
        };

        window.approveWithdraw = async (id) => {
            await updateDoc(doc(db, "withdrawals", id), { status: "approved" });
            Swal.fire('Paid', 'Withdrawal Marked as Approved!', 'success');
        };

        window.rejectItem = async (col, id) => {
            await deleteDoc(doc(db, col, id));
            Swal.fire('Deleted', 'Request Rejected!', 'info');
        };

        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('btn-active', 'text-white'));
            document.getElementById('btn-' + tab).classList.add('btn-active', 'text-white');
        };

    </script>
</body>
</html>
