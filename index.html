<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | CrashCraft</title>
    <style>
        /* CSS Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            text-align: center;
        }

        .container {
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        h1 {
            color: #e67e22;
            margin-bottom: 15px;
            font-size: 28px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .email-box {
            background: #fdf2e9;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #e67e22;
            font-size: 14px;
        }

        .email-box a {
            color: #d35400;
            text-decoration: none;
            font-weight: bold;
        }

        .email-box a:hover {
            text-decoration: underline;
        }

        /* Animation */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
            60% {transform: translateY(-7px);}
        }

        .dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🛠️</div>
        <h1>Under Maintenance</h1>
        <p>We are currently working on something awesome! <br> 
           <strong>Please be patient</strong> while we upgrade our systems<span class="dots"></span></p>
        
        <div class="email-box">
            If you think this is an error, please contact us: <br>
            <a href="mailto:teamcrashcraft@gmail.com" id="emailLink">teamcrashcraft@gmail.com</a>
        </div>
    </div>

    <script>
        // Simple JavaScript to log maintenance start (Optional)
        document.addEventListener('DOMContentLoaded', () => {
            console.log("Maintenance mode active...");
            
            // You can add a simple dynamic message based on time
            const email = document.getElementById('emailLink');
            email.addEventListener('click', () => {
                console.log("User trying to contact support.");
            });
        });
    </script>
</body>
</html>
